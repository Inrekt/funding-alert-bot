name: Funding Rate Alert

on:
  schedule:
    # Запуск каждые 10 минут (расписание в UTC, формат cron)
    - cron: "*/10 * * * *"
  workflow_dispatch:
    # Позволяет запустить вручную кнопкой "Run workflow" на GitHub

permissions:
  contents: write   # нужно, чтобы workflow мог закоммитить обновлённый state.json

jobs:
  check-funding:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run funding check
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python funding_alert_bot.py

      - name: Commit updated state file
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add state.json
          git diff --staged --quiet || git commit -m "Update funding state"
          git push
